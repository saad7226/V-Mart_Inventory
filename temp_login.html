<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | QPOS</title>
    <link rel="shortcut icon" href="https://flashing-unbalance-snowplow.ngrok-free.dev/uploads/assets/images/logo/1777094756_69ec5064738bb_shopping-cart.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --grad-1: #0f0c29;
            --grad-2: #302b63;
            --grad-3: #24243e;
            --accent:  #7c3aed;
            --accent2: #06b6d4;
            --glass-bg: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.15);
            --text-primary: #f1f5f9;
            --text-muted: #94a3b8;
            --input-bg: rgba(255,255,255,0.06);
            --input-border: rgba(255,255,255,0.12);
            --input-focus: rgba(124,58,237,0.5);
            --error: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--grad-1) 0%, var(--grad-2) 50%, var(--grad-3) 100%);
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* ── Animated orbs ──────────────────────────────────── */
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: float 8s ease-in-out infinite; pointer-events: none; }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #7c3aed, transparent); top: -150px; left: -150px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #06b6d4, transparent); bottom: -100px; right: -100px; animation-delay: -3s; }
        .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #ec4899, transparent); top: 50%; left: 60%; animation-delay: -5s; }
        @keyframes float {
            0%,100% { transform: translateY(0px) scale(1); }
            50%      { transform: translateY(-30px) scale(1.05); }
        }

        /* ── Card ────────────────────────────────────────────── */
        .auth-card {
            position: relative; z-index: 10;
            width: 100%; max-width: 460px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px 44px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo / Header ───────────────────────────────────── */
        .auth-logo { display: block; margin: 0 auto 24px; max-height: 48px; width: auto; }
        .auth-title { font-size: 28px; font-weight: 800; color: var(--text-primary); text-align: center; margin-bottom: 6px; letter-spacing: -0.5px; }
        .auth-subtitle { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 36px; }

        /* ── Alert ───────────────────────────────────────────── */
        .alert { border-radius: 12px; padding: 12px 16px; font-size: 13px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 10px; }
        .alert-error { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; }
        .alert-success { background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3); color: #6ee7b7; }
        .alert svg { flex-shrink: 0; margin-top: 1px; }

        /* ── Form ────────────────────────────────────────────── */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.3px; }
        .input-wrapper { position: relative; }
        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            outline: none;
        }
        .form-control::placeholder { color: #475569; }
        .form-control:focus {
            border-color: var(--accent);
            background: rgba(124,58,237,0.08);
            box-shadow: 0 0 0 3px var(--input-focus);
        }
        .form-control.is-invalid { border-color: var(--error); }
        .invalid-msg { font-size: 12px; color: var(--error); margin-top: 6px; display: block; }

        /* Eye toggle */
        .eye-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #475569; display: flex; align-items: center;
            transition: color 0.2s;
        }
        .eye-toggle:hover { color: var(--text-muted); }
        .form-control.has-toggle { padding-right: 44px; }

        /* ── Row extras ──────────────────────────────────────── */
        .form-row-extras {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 28px;
        }
        .remember-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--text-muted); }
        .remember-label input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
        .forgot-link { font-size: 13px; color: #a78bfa; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .forgot-link:hover { color: #c4b5fd; }

        /* ── Submit button ───────────────────────────────────── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
            color: #fff;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(124,58,237,0.4);
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(124,58,237,0.55); }
        .btn-submit:active { transform: translateY(0); }

        /* ── Footer link ─────────────────────────────────────── */
        .auth-footer { text-align: center; margin-top: 28px; font-size: 14px; color: var(--text-muted); }
        .auth-footer a { color: #a78bfa; font-weight: 600; text-decoration: none; transition: color 0.2s; }
        .auth-footer a:hover { color: #c4b5fd; }

        /* ── Divider ─────────────────────────────────────────── */
        .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }
        .divider span { font-size: 12px; color: #475569; white-space: nowrap; }

        @media (max-width: 500px) {
            .auth-card { padding: 36px 24px; }
            .auth-title { font-size: 24px; }
        }
    </style>
